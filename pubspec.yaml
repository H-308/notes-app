name: notes_app
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Firebase - downgraded to SDK 34 compatible versions
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0

  # State Management
  provider: ^6.1.1

  # Location & Maps - using flutter_map with OpenStreetMap
  geolocator: ^11.0.0

  # Image Handling
  image_picker: ^1.1.0
  cached_network_image: ^3.3.0

  # Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  uuid: ^4.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.24


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_icon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/
